# Unified gateway: one origin for the single-suite product.
#
#   /            -> InfraStudio SPA (the unified product UI: Design + Operations + Assistant)
#   /api/        -> Oz control-plane API           (service: api:8000)
#   /studio-api/ -> InfraStudio API (rewritten to /api/) (infrastudio-api:8001)
#   /leon/       -> Leon assistant (prefix stripped, x-api-key injected) (leon:5366)
#
# Docker's embedded DNS (127.0.0.11) + variable upstreams let the gateway start
# even if a backend is briefly unavailable, and resolve it at runtime.
resolver 127.0.0.11 valid=5s ipv6=off;

limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the wire (JS/CSS/JSON/SVG). Big win for the SPA
    # bundles — e.g. the lazy pdf chunk drops from ~868 KB to ~270 KB.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml font/woff2;

    # Long-cache fingerprinted assets (filenames include a content hash).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Oz control-plane API ----
    location /api/agents/ws/ {
        set $oz_ws http://api:8000;
        proxy_pass $oz_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        set $oz_api http://api:8000;
        proxy_pass $oz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---- InfraStudio API (its native routes live under /api/) ----
    location /studio-api/ {
        limit_req zone=api burst=20 nodelay;
        set $studio_api http://infrastudio-api:8001;
        rewrite ^/studio-api/(.*)$ /api/$1 break;
        proxy_pass $studio_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Leon assistant ----
    # Strip the /leon prefix and inject the API key so the browser never holds it.
    # NOTE: this value must match LEON_HTTP_API_KEY in the compose/.env (default dev-key-123).
    location /leon/ {
        set $leon http://leon:5366;
        rewrite ^/leon/(.*)$ /$1 break;
        proxy_pass $leon;
        proxy_set_header x-api-key "dev-key-123";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # ---- Unified SPA (root) ----
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
